/amcl:
  ros__parameters:
    # 1.1. Фреймы координат
    base_frame_id: base_link
    odom_frame_id: odom
    global_frame_id: map
    tf_broadcast: true

    # 1.2. Топики и QoS
    map_topic: map
    scan_topic: scan
    qos_overrides:
      /tf:
        publisher:
          depth: 100
          durability: volatile
          history: keep_last
          reliability: reliable

    # 1.3. Режим времени
    use_sim_time: false

    # 1.4. Начальная позиция
    set_initial_pose: false
    initial_pose:
      x: -1.5
      y: 0.2
      yaw: 0.0
      z: 0.0

    # 1.5. Доп фичи
    always_reset_initial_pose: false
    first_map_only: false
    transform_tolerance: 0.5
    save_pose_rate: 0.1

    # 2. Настройка модели движения (шумы)
    robot_model_type: nav2_amcl::DifferentialMotionModel
    alpha1: 0.05
    alpha2: 0.05
    alpha3: 0.05
    alpha4: 0.05

    # 3. Настройка модели лазера
    # 3.1. Выбор типа модели
    laser_model_type: likelihood_field

    # 3.2. Параметры диапазона лазера
    laser_max_range: 12.0
    laser_min_range: 0.05
    laser_likelihood_max_dist: 1.0

    # 3.3. Веса компонент модели (для likelihood_field)
    z_hit: 0.5
    z_rand: 0.4
    z_short: 0.05
    z_max: 0.05

    # 3.4. Cтандартное отклонение гауссианы для попадания
    sigma_hit: 0.2

    # 3.5. Количество лучей
    max_beams: 60

    # 3.6. Дополнительные параметры (если используется beam-модель)
    lambda_short: 0.1
    do_beamskip: false
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3

    # 4. Настройка фильтра частиц
    # 4.1. Количество частиц
    max_particles: 8000
    min_particles: 500

    # 4.2. Параметры сходимости
    pf_err: 0.03
    pf_z: 0.99

    # 4.3. Условия обновления фильтра
    update_min_a: 0.02
    update_min_d: 0.02

    # 4.4. Ресемплинг
    resample_interval: 1

    # 5. Настройка восстановления (Параметры экспоненциального сглаживания)
    recovery_alpha_fast: 0.1
    recovery_alpha_slow: 0.1

    # ???
    /bond_disable_heartbeat_timeout: true


